spring.application.name=grocery

# ===== DB (default: local) =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/grocery}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.demo.allowBackdateSales=false

server.port=${PORT:8080}

# ===== Mail feature toggle (deploy ให้ผ่านก่อน) =====
# Render: ตั้งค่า env var APP_MAIL_ENABLED=false (หรือไม่ตั้งก็ได้ ค่า default คือ false)
app.mail.enabled=${APP_MAIL_ENABLED:false}