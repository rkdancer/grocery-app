<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Sales Report - Stock ร้านสุขใจ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <div class="sidebar">
            <div class="logo-section">
                <i class="fas fa-store fa-2x" style="color: #fbc02d;"></i>
                <span class="logo-text">STOCK<br><small>ร้านสุขใจ</small></span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="categories.html"><i class="fas fa-shopping-bag"></i> Product</a></li>
                <li><a href="report.html" class="active"><i class="fas fa-chart-bar"></i> Report</a></li>
            </ul>
        </div>

        <div class="main-content">
            <h1 class="page-title">รายงานยอดขาย</h1>

            <div class="chart-container">
                <div class="bar" style="height: 100%;"><span>ขนม</span></div>
                <div class="bar" style="height: 85%;"><span>เครื่องดื่ม</span></div>
                <div class="bar" style="height: 70%;"><span>อาหารกระป๋อง</span></div>
                <div class="bar" style="height: 60%;"><span>ของใช้</span></div>
                <div class="bar" style="height: 50%;"><span>เครื่องปรุง</span></div>
                <div class="bar" style="height: 40%;"><span>สุขภาพ</span></div>
            </div>

            <div style="margin-top: 30px;">
                <h3>ลำดับสินค้าขายดี</h3>
                <ol style="margin-left: 20px; margin-top: 10px; font-size: 1.1rem; line-height: 1.8;">
                    <li>ขนม</li>
                    <li>เครื่องดื่ม</li>
                    <li>อาหารกระป๋อง</li>
                    <li>ของใช้ในบ้าน</li>
                    <li>เครื่องปรุง</li>
                    <li>ผลิตภัณฑ์สุขภาพ</li>
                </ol>
            </div>
             <a href="categories.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        </div>
    </div>
</body>
</html>
