<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Stock ร้านสุขใจ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="logo-modern-wrapper">
    <div class="sukjai-icon">
        <div class="box-tape"></div>
        <div class="box-face">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="cheeks left"></div>
            <div class="cheeks right"></div>
            <div class="mouth"></div>
        </div>
    </div>
    <div class="logo-text-wrapper">
        <span class="brand-stock">STOCK</span>
        <span class="brand-name">ร้านสุขใจ</span>
    </div>
</div>

        <h2 style="text-align: left; margin-bottom: 5px;">Register</h2>
        <p style="text-align: left; color: #888; margin-bottom: 20px; font-size: 0.9rem;">
            Create your new account
        </p>

        <form id="registerForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="regUsername" class="form-control"
                       placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div style="position: relative;">
                    <input type="password" id="regPassword" class="form-control"
                           placeholder="Create password" required>
                    <i class="fas fa-eye-slash" id="toggleRegPassword"
                       style="position: absolute; right: 10px; top: 12px; color: #888; cursor: pointer;"></i>
                </div>
                <small style="display:block; margin-top:6px; color:#666;">
                    อย่างน้อย 6 ตัวอักษร
                </small>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="regPassword2" class="form-control"
                       placeholder="Confirm password" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" class="form-control"
                       placeholder="Enter email address" required>
            </div>

            <div class="form-group">
                <label>Select Role</label>
                <select id="regRole" class="form-control" required>
                    <option value="ADMIN">Admin (ผู้ดูแลระบบ)</option>
                    <option value="OWNER">Owner (เจ้าของร้าน)</option>
                    <option value="STAFF">Staff (พนักงาน)</option>
                </select>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 10px;" id="registerBtn">
                Sign Up
            </button>

            <div style="margin-top: 20px; font-size: 0.9rem;">
                Already have an account?
                <a href="login.html"
                   style="color: #1976d2; text-decoration: none; font-weight: 500;">
                    Login Here
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    const registerForm = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');

    const toggleRegPassword = document.getElementById('toggleRegPassword');
    const regPassword = document.getElementById('regPassword');

    toggleRegPassword.addEventListener('click', function () {
        const type = regPassword.getAttribute('type') === 'password' ? 'text' : 'password';
        regPassword.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    registerForm.addEventListener('submit', async function (e) {
        e.preventDefault();

        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim().toLowerCase();
        const password = document.getElementById('regPassword').value;
        const password2 = document.getElementById('regPassword2').value;
        const role = document.getElementById('regRole').value; // ADMIN / OWNER / STAFF

        if (!username || !email || !password || !password2 || !role) {
            alert("กรุณากรอกข้อมูลให้ครบ");
            return;
        }

        if (password.length < 6) {
            alert("รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร");
            return;
        }

        if (password !== password2) {
            alert("รหัสผ่านไม่ตรงกัน");
            return;
        }

        registerBtn.disabled = true;
        registerBtn.textContent = "Signing up...";

        try {
            const res = await fetch("/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, email, password, role })
            });

            const data = await res.json().catch(() => null);

            if (!res.ok || !data?.success) {
                alert(data?.message || "สมัครสมาชิกไม่สำเร็จ");
                return;
            }

            alert("สมัครสมาชิกสำเร็จ กรุณาเข้าสู่ระบบ");
            window.location.href = "login.html";

        } catch (err) {
            console.error(err);
            alert("เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ (ตรวจว่า backend รันอยู่ไหม)");
        } finally {
            registerBtn.disabled = false;
            registerBtn.textContent = "Sign Up";
        }
    });
</script>
</body>
</html>
