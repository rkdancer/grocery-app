<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card" style="text-align: left;">
        <a href="login.html" style="text-decoration: none; color: #333; display: block; margin-bottom: 20px;">
            <i class="fas fa-chevron-left"></i> Back
        </a>

        <h2>Forgot Password</h2>
        <p style="color: #888; margin-bottom: 30px; font-size: 0.9rem;">
            Enter your registered email address. we'll send you a code to reset your password.
        </p>

        <!-- ✅ เปลี่ยนจาก action เป็น submit handler -->
        <form id="forgotForm">
            <div class="form-group">
                <label>Email Address</label>
                <input
                        type="email"
                        id="forgotEmail"
                        class="form-control"
                        placeholder="Enter your email"
                        required
                >
            </div>

            <button type="submit" class="btn-primary" id="sendOtpBtn">Send OTP</button>
        </form>
    </div>
</div>

<script>
    const form = document.getElementById("forgotForm");
    const emailInput = document.getElementById("forgotEmail");
    const btn = document.getElementById("sendOtpBtn");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = emailInput.value.trim().toLowerCase();
        if (!email) {
            alert("กรุณากรอกอีเมล");
            return;
        }

        btn.disabled = true;
        btn.textContent = "Sending...";

        try {
            const res = await fetch("/api/auth/forgot/request-otp", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });

            const data = await res.json().catch(() => null);

            if (!res.ok) {
                alert(data?.message || "ส่ง OTP ไม่สำเร็จ");
                return;
            }

            // ✅ เก็บ otpRefId + email ไว้ใช้ในหน้า otp.html
            if (data?.otpRefId) {
                localStorage.setItem("forgot_otpRefId", String(data.otpRefId));
            }
            localStorage.setItem("forgot_email", email);

            alert(data?.message || "ส่ง OTP แล้ว กรุณาตรวจสอบอีเมล");

            // ✅ ไปหน้ากรอก OTP
            window.location.href = "otp.html";

        } catch (err) {
            console.error(err);
            alert("เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ (ตรวจว่า backend รันอยู่ไหม)");
        } finally {
            btn.disabled = false;
            btn.textContent = "Send OTP";
        }
    });
</script>
</body>
</html>
