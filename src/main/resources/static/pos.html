<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ขายสินค้า (POS) - Stock ร้านสุขใจ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* ===== LAYOUT ===== */
        .pos-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        /* ===== DROPDOWN ===== */
        #categorySelect {
            width: 320px;
            height: 45px;
            border-radius: 50px;
            border: 1px solid #b3e5fc;
            padding: 0 20px;
            box-shadow: 0 2px 6px rgba(25, 118, 210, 0.1);
            background-color: #fff;
            color: #444;
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            outline: none;

            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231976d2' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;

            transition: all 0.3s ease;
        }

        #categorySelect:focus {
            border-color: #1976d2;
            box-shadow: 0 4px 12px rgba(25, 118, 210, 0.2);
        }

        /* ===== PRODUCT CARD ===== */
        .product-card {
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: .15s;
            background: #fff;
        }

        .product-card:hover {
            box-shadow: 0 4px 14px rgba(0, 0, 0, .1);
            transform: translateY(-2px);
        }

        .product-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        /* ===== CART ===== */
        .cart {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 16px;
            background: #fff;
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
            flex: 1;
        }

        .cart-left .name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #333;
        }

        .cart-left .sub {
            font-size: .85rem;
            color: #666;
        }

        /* ===== QTY CONTROLS ===== */
        .qty-controls {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .qty-btn {
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #1976d2;
            color: #fff;
            cursor: pointer;
            font-weight: 700;
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .qty-btn:hover { background: #1565c0; }
        .qty-btn.danger { background: #ef5350; }
        .qty-btn.danger:hover { background: #d32f2f; }

        .qty-input {
            width: 50px;
            height: 30px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            outline: none;
            font-size: 0.9rem;
        }

        .qty-input:focus {
            border-color: #1976d2;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, .15);
        }

        .total-box {
            border-top: 2px dashed #eee;
            padding-top: 15px;
            margin-top: 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
        }

        .total-box span:last-child {
            color: #1976d2;
        }

        /* ✅ ทำให้ปุ่ม Logout เหมือนหน้า categories (แก้ปุ่มใหญ่เกิน) */
        .sidebar-menu .logout-btn{
          width:100%;
          text-align:left;
          border:none;
          background:transparent;
          color:inherit;
          padding:10px 12px;
          cursor:pointer;
          display:flex;
          gap:10px;
          align-items:center;
          border-radius:8px;
        }
        .sidebar-menu .logout-btn:hover{
          background: rgba(255,255,255,0.5);
        }
    </style>
</head>

<body>
<div class="dashboard-wrapper">

    <div class="sidebar">
        <div class="logo-modern-wrapper">
            <div class="sukjai-icon">
                <div class="box-tape"></div>
                <div class="box-face">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="cheeks left"></div>
                    <div class="cheeks right"></div>
                    <div class="mouth"></div>
                </div>
            </div>
            <div class="logo-text-wrapper">
                <span class="brand-stock">STOCK</span>
                <span class="brand-name">ร้านสุขใจ</span>
            </div>
        </div>

        <ul class="sidebar-menu" id="sidebarMenu">
            <!-- sidebar injected by components/sidebar.js -->
        </ul>
    </div>

    <div class="main-content">
        <h1 class="page-title">ขายสินค้า (POS)</h1>

        <div style="margin-bottom:20px;">
            <select id="categorySelect">
                <option value="">-- เลือกประเภทสินค้า --</option>
            </select>
        </div>

        <div class="pos-layout">
            <div>
                <h3 style="margin-bottom:15px; color:#444;">สินค้า</h3>
                <div class="grid-container" id="productGrid"></div>
            </div>

            <div class="cart">
                <h3 style="margin-bottom:15px; color:#444; border-bottom:1px solid #eee; padding-bottom:10px;">
                    <i class="fas fa-shopping-basket" style="color:#1976d2;"></i> ตะกร้า
                </h3>
                <div id="cartList"></div>

                <div class="total-box">
                    <span>รวมทั้งสิ้น</span>
                    <span><span id="totalPrice">0</span> บาท</span>
                </div>

                <button class="btn-primary"
                        style="width:100%; margin-top:15px; border-radius:50px; font-weight:bold; height:45px;"
                        onclick="checkout()">
                    <i class="fas fa-check-circle"></i> ยืนยันการขาย
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    /* ================= AUTH ================= */
    function logout(){
        localStorage.clear();
        location.href = "login.html";
    }

    const me = JSON.parse(localStorage.getItem("user") || "null");
    if (!me) logout();

    function getAccessToken(){ return localStorage.getItem("accessToken") || ""; }
    async function authFetch(url, opt = {}){
        const token = getAccessToken();
        if(!token) logout();

        const h = new Headers(opt.headers || {});
        h.set("Authorization", "Bearer " + token);

        const r = await fetch(url, { ...opt, headers: h });
        if(r.status === 401) logout();
        return r;
    }

    /* ================= POS LOGIC ================= */
    let cart = [];

    async function loadCategories(){
        const res = await authFetch("/api/categories?page=0&size=100");
        const data = await res.json();
        const sel = document.getElementById("categorySelect");

        (data.items || []).forEach(c => {
            const op = document.createElement("option");
            op.value = c.id;
            op.textContent = c.name;
            sel.appendChild(op);
        });
    }

    async function loadProducts(categoryId){
        const res = await authFetch(`/api/categories/${categoryId}/products?page=0&size=100`);
        const data = await res.json();
        renderProducts(data.items || []);
    }

    function renderProducts(items){
        const grid = document.getElementById("productGrid");
        grid.innerHTML = "";

        if(items.length === 0){
            grid.innerHTML = "<p style='color:#777; grid-column:1/-1; text-align:center;'>- ไม่มีสินค้าในหมวดนี้ -</p>";
            return;
        }

        items.forEach(p => {
            const d = document.createElement("div");
            d.className = "product-card";
            d.innerHTML = `
                <img src="${p.imageUrl || 'https://placehold.co/200'}">
                <div style="font-weight:600; margin-bottom:4px;">${p.name}</div>
                <div style="color:#1976d2; font-weight:bold;">${p.sellPrice} บาท</div>
                <div style="font-size:0.85rem; color:${p.stockQty > 0 ? '#2e7d32' : '#d32f2f'}">
                    คงเหลือ ${p.stockQty}
                </div>
            `;
            d.onclick = () => addToCart(p);
            grid.appendChild(d);
        });
    }

    function addToCart(p){
        if(p.stockQty <= 0) {
            alert("สินค้าหมด!");
            return;
        }

        const f = cart.find(i => i.productId === p.id);
        if(f){
            if(f.qty < p.stockQty) {
                f.qty++;
            } else {
                alert("จำนวนเกินสต็อกที่มี");
                return;
            }
        }else{
            cart.push({
                productId: p.id,
                name: p.name,
                price: Number(p.sellPrice) || 0,
                qty: 1,
                stockQty: Number(p.stockQty) || 0
            });
        }
        renderCart();
    }

    function decreaseQty(id){
        const f = cart.find(i => i.productId === id);
        if(!f) return;

        if(f.qty > 1){
            f.qty--;
        }else{
            cart = cart.filter(i => i.productId !== id);
        }
        renderCart();
    }

    function increaseQty(id){
        const f = cart.find(i => i.productId === id);
        if(!f) return;

        if(f.qty < f.stockQty){
            f.qty++;
            renderCart();
        } else {
            alert("จำนวนเกินสต็อกที่มี");
        }
    }

    function setQty(id, rawValue){
        const f = cart.find(i => i.productId === id);
        if(!f) return;

        let n = Number(rawValue);
        if(!Number.isFinite(n) || n < 1) n = 1;

        if(n > f.stockQty) {
            n = f.stockQty;
            alert("ปรับจำนวนเท่ากับสต็อกที่มีสูงสุด (" + f.stockQty + ")");
        }

        n = Math.floor(n);
        f.qty = n;
        renderCart();
    }

    function renderCart(){
        const list = document.getElementById("cartList");
        list.innerHTML = "";
        let total = 0;

        if(cart.length === 0) {
            list.innerHTML = "<p style='text-align:center; color:#999; margin:20px 0;'>ยังไม่มีสินค้า</p>";
            document.getElementById("totalPrice").textContent = "0";
            return;
        }

        cart.forEach(i => {
            total += i.qty * i.price;

            list.innerHTML += `
                <div class="cart-item">
                    <div class="cart-left">
                        <div class="name">${i.name}</div>
                        <div class="sub">${i.price} บ. | เหลือ ${i.stockQty}</div>
                    </div>

                    <div class="qty-controls">
                        <button class="qty-btn danger" onclick="decreaseQty(${i.productId})">
                            <i class="fas fa-minus" style="font-size:0.7rem;"></i>
                        </button>

                        <input class="qty-input"
                               type="number"
                               inputmode="numeric"
                               value="${i.qty}"
                               onchange="setQty(${i.productId}, this.value)"
                        />

                        <button class="qty-btn" onclick="increaseQty(${i.productId})">
                            <i class="fas fa-plus" style="font-size:0.7rem;"></i>
                        </button>
                    </div>
                </div>
            `;
        });

        document.getElementById("totalPrice").textContent = total.toLocaleString();
    }

    async function checkout(){
        if(cart.length === 0){
            alert("ยังไม่มีสินค้าในตะกร้า");
            return;
        }

        if(!confirm("ยืนยันการขายยอดรวม " + document.getElementById("totalPrice").textContent + " บาท?")) return;

        const payload = {
            items: cart.map(i => ({
                productId: i.productId,
                qty: i.qty
            }))
        };

        const res = await authFetch("/api/sales",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(payload)
        });

        if(!res.ok){
            const err = await res.json().catch(()=>({}));
            alert("ขายไม่สำเร็จ: " + (err.message || "Unknown error"));
            return;
        }

        alert("✅ บันทึกการขายเรียบร้อย!");

        const currentCat = document.getElementById("categorySelect").value;
        cart = [];
        renderCart();
        if(currentCat) loadProducts(currentCat);
    }

    document.getElementById("categorySelect").addEventListener("change", e => {
        if(e.target.value) loadProducts(e.target.value);
        else document.getElementById("productGrid").innerHTML = "";
    });

    loadCategories();
</script>

<script src="components/sidebar.js"></script>
</body>
</html>
