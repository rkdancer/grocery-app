<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Categories - Stock ร้านสุขใจ</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .sidebar-menu .logout-btn{
          width:100%;
          text-align:left;
          border:none;
          background:transparent;
          color:inherit;
          padding:10px 12px;
          cursor:pointer;
          display:flex;
          gap:10px;
          align-items:center;
          border-radius:8px;
        }
        .sidebar-menu .logout-btn:hover{
          background: rgba(255,255,255,0.5);
        }

        .card-item{ position:relative; cursor:pointer; }
        .card-actions{
          position:absolute; top:10px; right:10px;
          display:flex; gap:8px; z-index:2;
        }
        .icon-btn{
          width:36px;height:36px;
          border:none;border-radius:10px;
          background:#fff;
          box-shadow:0 2px 8px rgba(0,0,0,.1);
          cursor:pointer;
          display:flex;align-items:center;justify-content:center;
        }
        .icon-btn.edit i{ color:#1976d2; }
        .icon-btn.del i{ color:#d32f2f; }

        .search-row {
            display: flex;
            justify-content: flex-start;
            max-width: 810px;
            width: 100%;
            margin: 0 auto 20px auto;
        }

        .search-box {
            width: 320px;
            height: 45px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border: 1px solid #b3e5fc;
            border-radius: 50px;
            padding: 0 15px;
            box-shadow: 0 2px 6px rgba(25, 118, 210, 0.1);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .search-box i.fa-search {
            color: #1976d2;
            font-size: 1.1rem;
            min-width: 20px;
            text-align: center;
        }

        .search-box input {
            border: none !important;
            outline: none !important;
            background: transparent;
            width: 100%;
            height: 100%;
            font-size: 1rem;
            color: #444;
            padding: 0;
            margin: 0;
        }

        .search-clear {
            border: none !important;
            background: transparent;
            width: 30px;
            height: 30px;
            cursor: pointer;
            color: #bbb;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            font-size: 1rem;
            padding: 0;
        }

        .search-clear:hover {
            color: #ef5350;
        }

        .pagination{
          display:flex; justify-content:center; gap:8px;
          margin-top:20px; flex-wrap:wrap;
        }
        .page-btn{
          border:1px solid #d0d7de; background:#fff;
          padding:8px 12px; border-radius:10px;
          cursor:pointer; font-weight:600;
        }
        .page-btn.active{
          background:#1976d2; color:#fff; border-color:#1976d2;
        }
    </style>
</head>

<body>
<div class="dashboard-wrapper">

    <div class="sidebar">
        <div class="logo-modern-wrapper">
            <div class="sukjai-icon">
                <div class="box-tape"></div>
                <div class="box-face">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="cheeks left"></div>
                    <div class="cheeks right"></div>
                    <div class="mouth"></div>
                </div>
            </div>
            <div class="logo-text-wrapper">
                <span class="brand-stock">STOCK</span>
                <span class="brand-name">ร้านสุขใจ</span>
            </div>
        </div>

        <ul class="sidebar-menu" id="sidebarMenu">
            <!-- sidebar injected by JS -->
        </ul>
    </div>

    <div class="main-content">
        <div class="page-header-wrapper">
            <h1 class="page-title">ประเภทสินค้า</h1>
            <button class="btn-add-category" onclick="openAddModal()">
                <i class="fas fa-plus"></i> เพิ่มประเภทสินค้า
            </button>
        </div>

        <div class="search-row">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input id="searchInput" placeholder="ค้นหาประเภทสินค้า...">
                <button class="search-clear" id="clearBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <div class="grid-container" id="categoryGrid"></div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<div id="categoryModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle"></h2>

        <div class="form-group">
            <label>ชื่อประเภทสินค้า</label>
            <input id="catName" class="form-control">
        </div>

        <div class="form-group">
            <label>รูปภาพ</label>
            <input type="file" id="catImage" accept="image/*">
        </div>

        <button class="btn-primary" onclick="saveCategory()">บันทึก</button>
    </div>
</div>

<script>
    function logout(){
      localStorage.clear();
      location.href="login.html";
    }
    const me = JSON.parse(localStorage.getItem("user") || "null");
    if (!me) logout();


    const sidebar = document.getElementById("sidebarMenu");

    if (me.role === "OWNER") {
      sidebar.innerHTML += `
        <li>
          <a href="owner_dashboard.html" class="sidebar-link">
            <i class="fas fa-chart-line"></i> แดชบอร์ด
          </a>
        </li>
      `;
    }

    sidebar.innerHTML += `
      <li>
        <a href="categories.html" class="sidebar-link active">
          <i class="fas fa-box"></i> สินค้า
        </a>
      </li>
      <li>
        <a href="pos.html" class="sidebar-link">
          <i class="fas fa-cash-register"></i> ขายสินค้า
        </a>
      </li>
      <li>
        <button class="sidebar-link logout-btn" onclick="logout()">
          <i class="fas fa-right-from-bracket"></i> Logout
        </button>
      </li>
    `;

    async function authFetch(url,opt={}){
      const t = localStorage.getItem("accessToken");
      if(!t) logout();
      const h=new Headers(opt.headers||{});
      h.set("Authorization","Bearer "+t);
      return fetch(url,{...opt,headers:h});
    }

    const PAGE_SIZE = 6;
    let page = 0;
    let total = 1;
    let q = "";

    function clampPage(){
      const maxPage = Math.max(0, (Number(total) || 1) - 1);
      if(page > maxPage) page = maxPage;
      if(page < 0) page = 0;
    }

    async function loadCategories(p=0){
      page = p;
      const r = await authFetch(
        `/api/categories?page=${p}&size=${PAGE_SIZE}&q=${encodeURIComponent(q)}`
      );
      const d = await r.json();
      total = d.totalPages || 1;
      renderCategories(d.items || []);
      renderPagination();
    }

    function renderCategories(items){
      const g=document.getElementById("categoryGrid");
      g.innerHTML="";
      if(items.length===0){
        g.innerHTML="<p style='text-align:center;color:#777;'>ไม่พบข้อมูล</p>";
        return;
      }
      items.forEach(c=>{
        const d=document.createElement("div");
        d.className="card-item";
        d.onclick=()=>location.href=`product_list.html?categoryId=${c.id}`;
        d.innerHTML=`
          <div class="card-actions">
            <button class="icon-btn edit"
              onclick="event.stopPropagation();openEditModal(${c.id},'${c.name}')">
              <i class="fas fa-pen"></i>
            </button>
            <button class="icon-btn del"
              onclick="event.stopPropagation();deleteCategory(${c.id})">
              <i class="fas fa-trash"></i>
            </button>
          </div>
          <p><b>${c.name}</b></p>
          <img src="${c.imageUrl||'https://placehold.co/200'}">
        `;
        g.appendChild(d);
      });
    }

    function renderPagination(){
      const p=document.getElementById("pagination");
      p.innerHTML="";
      for(let i=0;i<total;i++){
        const b=document.createElement("button");
        b.className="page-btn"+(i===page?" active":"");
        b.textContent=i+1;
        b.onclick=()=>loadCategories(i);
        p.appendChild(b);
      }
    }

    searchInput.oninput=()=>{
      clearTimeout(window._t);
      window._t=setTimeout(()=>{
        q=searchInput.value;
        loadCategories(0);
      },300);
    };
    clearBtn.onclick=()=>{
      searchInput.value="";
      q="";
      loadCategories(0);
    };

    let editId=null;
    function openAddModal(){
      editId=null;
      modalTitle.textContent="เพิ่มประเภทสินค้า";
      catName.value="";
      catImage.value="";
      categoryModal.style.display="block";
    }
    function openEditModal(id,name){
      editId=id;
      modalTitle.textContent="แก้ไขประเภทสินค้า";
      catName.value=name;
      catImage.value="";
      categoryModal.style.display="block";
    }
    function closeModal(){ categoryModal.style.display="none"; }

    async function saveCategory(){
      const fd=new FormData();
      fd.append("name",catName.value);
      if(catImage.files[0]) fd.append("image",catImage.files[0]);

      const url=editId?`/api/categories/${editId}`:`/api/categories`;
      const method=editId?"PUT":"POST";

      const r = await authFetch(url,{method,body:fd});
      if(!r.ok){
        alert("บันทึกไม่สำเร็จ");
        return;
      }

      closeModal();
      // ✅ อยู่หน้าเดิม ไม่เด้งกลับหน้า 1
      await loadCategories(page);
      clampPage();
      await loadCategories(page);
    }

    async function deleteCategory(id){
      if(!confirm("ลบประเภทสินค้านี้?")) return;

      const r = await authFetch(`/api/categories/${id}`,{method:"DELETE"});
      if(!r.ok){
        alert("ลบไม่สำเร็จ");
        return;
      }

      // ✅ โหลดหน้าเดิม แล้วถ้าหน้าว่างให้ถอยหน้า
      await loadCategories(page);
      clampPage();
      await loadCategories(page);
    }

    loadCategories();
</script>
<script src="components/sidebar.js"></script>
</body>
</html>
