<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password - Stock ร้านสุขใจ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h2 style="text-align: left; margin-bottom: 5px;">New Password</h2>
        <p style="text-align: left; color: #888; margin-bottom: 25px; font-size: 0.9rem;">
            Set your new password so you can login and access Stock ร้านสุขใจ.
        </p>

        <form id="newPassForm">
            <div class="form-group">
                <label>Enter New Password</label>
                <div style="position: relative;">
                    <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required>
                    <i class="fas fa-eye-slash toggle-pass" data-target="newPassword"
                       style="position: absolute; right: 10px; top: 12px; color: #888; cursor: pointer;"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <div style="position: relative;">
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required>
                    <i class="fas fa-eye-slash toggle-pass" data-target="confirmPassword"
                       style="position: absolute; right: 10px; top: 12px; color: #888; cursor: pointer;"></i>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 10px;" id="submitBtn">
                Update Password
            </button>
        </form>
    </div>
</div>

<script>
    // ======================
    // Toggle ดูรหัสผ่าน
    // ======================
    document.querySelectorAll('.toggle-pass').forEach(item => {
        item.addEventListener('click', function() {
            const targetId = this.getAttribute('data-target');
            const input = document.getElementById(targetId);
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    });

    // ======================
    // Reset Password
    // ======================
    const form = document.getElementById('newPassForm');
    const submitBtn = document.getElementById('submitBtn');

    // ดึง resetToken จากขั้น verify OTP
    const resetToken = localStorage.getItem("forgot_resetToken");
    if (!resetToken) {
        alert("ไม่พบข้อมูลสำหรับรีเซ็ตรหัสผ่าน กรุณาเริ่มใหม่อีกครั้ง");
        window.location.href = "forgot_password.html";
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        const pass1 = document.getElementById('newPassword').value;
        const pass2 = document.getElementById('confirmPassword').value;

        if (pass1 !== pass2) {
            alert("รหัสผ่านไม่ตรงกัน กรุณากรอกใหม่อีกครั้ง");
            return;
        }

        if (pass1.length < 6) {
            alert("รหัสผ่านต้องมีความยาวอย่างน้อย 6 ตัวอักษร");
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Updating...";

        try {
            const res = await fetch("/api/auth/forgot/reset-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    resetToken: resetToken,
                    newPassword: pass1
                })
            });

            const data = await res.json().catch(() => null);

            if (!res.ok) {
                alert(data?.message || "ไม่สามารถเปลี่ยนรหัสผ่านได้");
                return;
            }

            alert("เปลี่ยนรหัสผ่านสำเร็จ");

            // ล้าง token ที่ใช้แล้ว
            localStorage.removeItem("forgot_resetToken");
            localStorage.removeItem("forgot_otpRefId");
            localStorage.removeItem("forgot_email");

            // ไปหน้า success หรือ login
            window.location.href = "password_success.html";

        } catch (err) {
            console.error(err);
            alert("เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ (ตรวจว่า backend รันอยู่ไหม)");
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Update Password";
        }
    });
</script>
</body>
</html>
