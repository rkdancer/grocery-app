<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Stock ร้านสุขใจ</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* นำ CSS มาใส่ในนี้เพื่อให้แสดงผลได้ทันที */
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap');

        :root {
            --bg-blue: #e3f2fd;
            --primary: #1976d2;
            --text-dark: #333;
            --card-bg: #fff;
            --sidebar-width: 250px;
            --btn-blue: #0288d1;
            --btn-yellow: #fbc02d;
            --btn-red: #d32f2f;
            --status-red: #e57373;
            --status-green: #a5d6a7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background-color: var(--bg-blue);
            min-height: 100vh;
            display: flex;
        }

        /* --- Auth Pages --- */
        .auth-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #666;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #90caf9;
            background-color: #fbfdff;
            border-radius: 5px;
            outline: none;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #1976d2;
            background-color: #fff;
            box-shadow: 0 0 5px rgba(25, 118, 210, 0.3);
        }

        .fa-eye, .fa-eye-slash {
            cursor: pointer;
            transition: color 0.2s;
        }
        .fa-eye:hover, .fa-eye-slash:hover {
            color: var(--primary) !important;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #1565c0;
        }

        .auth-options {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        /* --- New Logo Styles (ส่วนที่เพิ่มใหม่) --- */
        .logo-modern-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        /* ตัวกล่องน้องสุขใจ */
        .sukjai-icon {
            width: 65px;
            height: 65px;
            background-color: var(--btn-yellow);
            border-radius: 14px;
            position: relative;
            box-shadow: 0 4px 10px rgba(251, 192, 45, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .sukjai-icon:hover {
            transform: scale(1.1) rotate(-5deg);
        }

        /* เทปปิดกล่อง */
        .box-tape {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 25px;
            background-color: rgba(255, 255, 255, 0.4);
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
        }

        /* จัดตำแหน่งหน้าตา */
        .box-face {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -10%);
            width: 100%;
            height: 100%;
        }

        /* ดวงตา */
        .eye {
            width: 7px;
            height: 7px;
            background-color: #3e2723;
            border-radius: 50%;
            position: absolute;
            top: 45%;
            animation: blink 4s infinite;
        }
        .eye.left { left: 18px; }
        .eye.right { right: 18px; }

        /* แก้ม */
        .cheeks {
            width: 8px;
            height: 5px;
            background-color: #ff8a80;
            border-radius: 50%;
            position: absolute;
            top: 58%;
            opacity: 0.6;
        }
        .cheeks.left { left: 15px; }
        .cheeks.right { right: 15px; }

        /* ปาก */
        .mouth {
            width: 14px;
            height: 7px;
            border-bottom: 2.5px solid #3e2723;
            border-radius: 0 0 10px 10px;
            position: absolute;
            top: 52%;
            left: 50%;
            transform: translateX(-50%);
        }

        /* ข้อความโลโก้ */
        .logo-text-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.1;
        }

        .brand-stock {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: 600;
            color: #333;
        }

        @keyframes blink {
            0%, 96%, 100% { transform: scaleY(1); }
            98% { transform: scaleY(0.1); }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="logo-modern-wrapper">
            <div class="sukjai-icon">
                <div class="box-tape"></div>
                <div class="box-face">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="cheeks left"></div>
                    <div class="cheeks right"></div>
                    <div class="mouth"></div>
                </div>
            </div>
            <div class="logo-text-wrapper">
                <span class="brand-stock">STOCK</span>
                <span class="brand-name">ร้านสุขใจ</span>
            </div>
        </div>
        <h2 style="text-align:left; margin-bottom:5px;">Welcome</h2>
        <p style="text-align:left; color:#888; margin-bottom:20px; font-size:0.9rem;">
            Please login here
        </p>

        <form id="loginForm">

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="emailInput" class="form-control"
                       placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div style="position:relative;">
                    <input type="password" id="passwordInput"
                           class="form-control" placeholder="Enter password" required>
                    <i class="fas fa-eye-slash" id="togglePassword"
                       style="position:absolute; right:10px; top:12px; color:#888; cursor:pointer;"></i>
                </div>
            </div>

            <div class="auth-options">
                <label>
                    <input type="checkbox" id="rememberMe"> Remember Me
                </label>
                <a href="forgot_password.html"
                   style="color:#1976d2; text-decoration:none;">
                    Forgot Password?
                </a>
            </div>

            <button type="submit" class="btn-primary" id="loginBtn">Login</button>

            <div style="margin-top:20px; font-size:0.9rem;">
                Don't have an account?
                <a href="register.html"
                   style="color:#1976d2; text-decoration:none; font-weight:500;">
                    Register New Account
                </a>
            </div>

        </form>
    </div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const togglePassword = document.getElementById('togglePassword');
    const rememberMeCheckbox = document.getElementById('rememberMe');
    const loginBtn = document.getElementById('loginBtn');

    // Remember Me
    window.onload = function () {
        const savedEmail = localStorage.getItem('rememberedEmail');
        if (savedEmail) {
            emailInput.value = savedEmail;
            rememberMeCheckbox.checked = true;
        }
    };

    // Toggle password
    togglePassword.addEventListener('click', function () {
        const type =
            passwordInput.getAttribute('type') === 'password'
                ? 'text'
                : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    // Login
    loginForm.addEventListener('submit', async function (e) {
        e.preventDefault();

        const email = emailInput.value.trim().toLowerCase();
        const password = passwordInput.value;

        if (!email || !password) {
            alert("กรุณากรอกอีเมลและรหัสผ่าน");
            return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";

        try {
            // จำลองการเชื่อมต่อ (หรือเปลี่ยน URL ให้ตรงกับ Backend ของคุณ)
            const res = await fetch("/api/auth/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!res.ok || !data.success) {
                alert(data.message || "อีเมลหรือรหัสผ่านไม่ถูกต้อง");
                return;
            }

            // Remember Me
            if (rememberMeCheckbox.checked) {
                localStorage.setItem("rememberedEmail", email);
            } else {
                localStorage.removeItem("rememberedEmail");
            }

            // เก็บ user
            localStorage.setItem("user", JSON.stringify({
                id: data.id,
                username: data.username,
                email: data.email,
                role: data.role
            }));

            // เก็บ token
            localStorage.setItem("accessToken", data.accessToken);
            if (data.expiresAt) {
                localStorage.setItem("tokenExpiresAt", data.expiresAt);
            }

            // Redirect ตาม Role
            const role = (data.role || "").toUpperCase();

            if (role === "ADMIN") {
                window.location.href = "admin_users.html";
            } else if (role === "STAFF") {
                window.location.href = "categories.html";
            }
             else if (role === "OWNER") {
                window.location.href = "owner_dashboard.html";
            }
             else {
                alert("Role ไม่ถูกต้อง");
            }

        } catch (err) {
            console.error(err);
            // กรณีเทสแบบไม่มี Backend ให้ Comment บรรทัด alert ด้านล่างออกถ้าต้องการแค่ดู UI
            alert("เชื่อมต่อเซิร์ฟเวอร์ไม่ได้");
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = "Login";
        }
    });
</script>

</body>
</html>
