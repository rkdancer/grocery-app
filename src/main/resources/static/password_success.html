<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Stock ร้านสุขใจ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" style="text-align: center; padding: 60px 40px;">
            
            <div class="success-icon-wrapper">
                <i class="fas fa-check-circle success-icon"></i>
            </div>

            <h2 style="margin-bottom: 15px; color: #2e7d32;">Password Changed!</h2>
            <p style="color: #666; margin-bottom: 30px;">
                Your password has been changed successfully.
            </p>

            <a href="login.html" class="btn-primary" style="display: block; text-decoration: none; line-height: 1.5;">
                Back to Login
            </a>

            <p style="margin-top: 20px; font-size: 0.85rem; color: #999;">
                Redirecting to login in <span id="countdown">3</span> seconds...
            </p>
        </div>
    </div>

    <script>
        // Script นับถอยหลังแล้วเด้งไปหน้า Login
        let seconds = 3;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(function() {
            seconds--;
            countdownEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = "login.html";
            }
        }, 1000);
    </script>
</body>
</html>
